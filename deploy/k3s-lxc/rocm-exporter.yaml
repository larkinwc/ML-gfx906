# ROCm GPU metrics exporter for pre-CDNA GPUs (MI50/gfx906)
# Deploy after copying rocm-exporter.py to the node:
#   kubectl create configmap rocm-exporter-script -n llm --from-file=exporter.py=rocm-exporter.py
#   kubectl apply -f rocm-exporter.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocm-exporter
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocm-exporter
  template:
    metadata:
      labels:
        app: rocm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
    spec:
      containers:
        - name: exporter
          image: docker.io/larkinwc/rocm-gfx906:6.3.3-complete
          command: ["python3", "/scripts/exporter.py"]
          ports:
            - containerPort: 9101
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "9.0.6"
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dev-kfd
              mountPath: /dev/kfd
            - name: dev-dri
              mountPath: /dev/dri
      volumes:
        - name: script
          configMap:
            name: rocm-exporter-script
        - name: dev-kfd
          hostPath:
            path: /dev/kfd
        - name: dev-dri
          hostPath:
            path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: rocm-exporter
  namespace: llm
spec:
  selector:
    app: rocm-exporter
  ports:
    - port: 9101
      targetPort: 9101
