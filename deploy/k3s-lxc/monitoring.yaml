# Prometheus + Grafana monitoring stack for LLM inference
# Scrapes both llama.cpp/vLLM metrics and ROCm GPU metrics
#
# Deploy:
#   kubectl apply -f monitoring.yaml
#
# Grafana: http://<node-ip>:3000 (admin/admin, anonymous viewer enabled)
# Prometheus: http://<node-ip>:9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: llm
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: llamacpp
        authorization:
          credentials: LLAMA_API_KEY_PLACEHOLDER
        static_configs:
          - targets: ["llama-cpp-llamacpp:8080"]
      - job_name: rocm-gpu
        static_configs:
          - targets: ["rocm-exporter:9101"]
      - job_name: llamacpp-cache
        static_configs:
          - targets: ["llamacpp-cache-exporter:9102"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: llm
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: llm
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: llm
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
