arch: amd64
cores: 48
features: nesting=1,keyctl=1,fuse=1
hostname: k3s
memory: 204800
nameserver: 1.1.1.1
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,hwaddr=BC:24:11:7E:4B:86,ip=192.168.1.199/24,type=veth
onboot: 1
ostype: ubuntu
rootfs: local-lvm:vm-100-disk-0,size=200G
swap: 8192

# K3s requirements - full privileged access
lxc.apparmor.profile: unconfined
lxc.cap.drop:
lxc.mount.auto: proc:rw sys:rw cgroup:rw

# GPU passthrough - all AMD Vega 20 (Radeon Instinct MI50)
lxc.cgroup2.devices.allow: c 226:* rwm
lxc.cgroup2.devices.allow: c 507:* rwm
lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir
lxc.mount.entry: /dev/kfd dev/kfd none bind,optional,create=file

# kmsg device access (needed by kubelet)
lxc.cgroup2.devices.allow: c 1:11 rwm
lxc.mount.entry: /dev/kmsg dev/kmsg none bind,optional,create=file
