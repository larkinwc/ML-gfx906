apiVersion: v1
kind: Pod
metadata:
  name: rocm-gfx906-smoke
  namespace: llm
spec:
  restartPolicy: Never
  nodeSelector:
    feature.node.kubernetes.io/amd-gpu-gfx906: "true"
  containers:
    - name: rocm
      image: docker.io/larkinwc/rocm-gfx906:7.2.0-complete
      imagePullPolicy: Always
      command: ["/bin/bash", "-lc"]
      args:
        - rocminfo && rocm-smi && sleep infinity
      env:
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "9.0.6"
      resources:
        requests:
          amd.com/gpu: 1
          cpu: "1"
          memory: 2Gi
        limits:
          amd.com/gpu: 1
          memory: 8Gi
      securityContext:
        runAsUser: 0
        seccompProfile:
          type: Unconfined
